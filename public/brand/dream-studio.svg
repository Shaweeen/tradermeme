<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="dream studio">
  <defs>
    <linearGradient id="dsInk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f2ff"/>
      <stop offset="45%" stop-color="#7eb6ff"/>
      <stop offset="100%" stop-color="#3ddeb0"/>
    </linearGradient>
    <linearGradient id="dsPanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141c2b"/>
      <stop offset="100%" stop-color="#0a101a"/>
    </linearGradient>
    <linearGradient id="dsLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(126,182,255,0)"/>
      <stop offset="35%" stop-color="#7eb6ff"/>
      <stop offset="70%" stop-color="#3ddeb0"/>
      <stop offset="100%" stop-color="rgba(61,222,176,0)"/>
    </linearGradient>
  </defs>
  <!-- panel -->
  <rect x="8" y="8" width="304" height="184" rx="36" fill="url(#dsPanel)" stroke="rgba(126,182,255,0.28)" stroke-width="2"/>
  <!-- soft inner highlight -->
  <rect x="12" y="12" width="296" height="176" rx="32" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <!-- wordmark -->
  <text x="160" y="96" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="54" font-weight="800" letter-spacing="-1.2" fill="url(#dsInk)">dream</text>
  <text x="160" y="138" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="28" font-weight="650" letter-spacing="8" fill="#d7e2f0">studio</text>
  <rect x="108" y="152" width="104" height="3" rx="2" fill="url(#dsLine)"/>
</svg>
